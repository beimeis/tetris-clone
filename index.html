<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/images/favicon.png" type="image/x-icon">
    <title>Tetris Clone</title>
</head>

<body class="bg-white min-h-screen flex flex-col items-center justify-center p-4"></body>
    <div class="flex-col items-center">
   
        <h1 class="tetris-title text-5xl font-black text-center mb-8 tracking-tighter uppercase">
            ТЕТРИС
        </h1>

        <div class="flex-row items-center justify-items-center">
            <div id='TetrisDIV' class="border-solid border border-black shadow-2xl">
                <div class="relative">
                    <div class="md:hidden absolute top-0 left-0 w-full p-2 flex flex-row justify-between">
                        <div class="text-white score-display">Очки: 0</div>
                        <canvas width="60" height="60" class='preview-canvas'></canvas>
                    </div>
                    <canvas class="tetris-bg-img" width='320' height='640' id='game'></canvas>
                </div>
            </div>
        </div>

        <div class="flex w-full gap-4 mt-4">
            <button id="btn_start"
                class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-md w-full transition-all active:scale-95">
                СТАРТ
            </button>
            <button id="btn_pause"
                class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-xl shadow-md w-full transition-all active:scale-95">
                ПАУЗА
            </button>
        </div>
    </div>

    <div
        class="hidden md:flex flex-col w-28 h-48 ml-4 p-2 mt-10 border-solid border-2 border-white/30 bg-white/10 backdrop-blur-sm rounded-lg items-center text-white">
        <div class="pt-3 pb-3 text-lg font-bold score-display">Очки: 0</div>
        <div class="text-xs uppercase tracking-widest opacity-70">Следуюший</div>
        <canvas width="80" height="80" class='preview-canvas mt-2'></canvas>
    </div>

    <script type="application/javascript" src="tetris.js"></script>
</body>

</html>
